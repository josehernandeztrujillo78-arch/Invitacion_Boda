<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Karina &amp; Gerardo · Invitación de Boda</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="preload" href="img/portad2.webp" as="image">

  <style>
    :root {
      --cream: #f7f2ea;
      --cream-deep: #efe6d8;
      --paper: #fffdf9;
      --ink: #4a453d;
      --muted: #8a7f72;
      --rose: #c08b86;
      --rose-soft: #d9b0aa;
      --gold: #b08d57;
      --gold-soft: #d8c39a;

      --serif: "Cormorant Garamond", serif;
      --sans: "Jost", sans-serif;

      --shadow-soft: 0 24px 60px -20px rgba(74, 58, 30, 0.35);
      --shadow-card: 0 40px 80px -30px rgba(74, 58, 30, 0.45);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    html {
      background: var(--cream);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      font-family: var(--sans);
      color: var(--ink);
      position: relative;
      /* Se usan comas para combinar la imagen con los degradados.
         El error anterior era un ';' que rompía la declaración. */
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(216, 195, 154, 0.35), transparent 60%),
        radial-gradient(900px 500px at 80% 110%, rgba(192, 139, 134, 0.28), transparent 55%),
      
         url("img/portad2.webp") center/cover no-repeat,
        linear-gradient(160deg, var(--cream) 0%, var(--cream-deep) 100%);
    }

    /* Luz ambiental suave */
    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .glow::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60vmax;
      height: 60vmax;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(176, 141, 87, 0.22), transparent 70%);
      animation: drift 14s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: translate(-58%, -55%) scale(0.95); }
      to   { transform: translate(-42%, -45%) scale(1.1); }
    }

    /* Corazones flotantes */
    .corazones {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }
    .corazones span {
      position: absolute;
      bottom: -60px;
      color: rgba(192, 139, 134, 0.5);
      animation: flotar linear infinite;
    }
    .corazones span:nth-child(1) { left: 8%;  font-size: 26px; animation-duration: 13s; }
    .corazones span:nth-child(2) { left: 24%; font-size: 42px; animation-duration: 17s; animation-delay: 2s; }
    .corazones span:nth-child(3) { left: 44%; font-size: 22px; animation-duration: 12s; animation-delay: 1s; }
    .corazones span:nth-child(4) { left: 63%; font-size: 38px; animation-duration: 18s; animation-delay: 3s; }
    .corazones span:nth-child(5) { left: 80%; font-size: 24px; animation-duration: 14s; }
    .corazones span:nth-child(6) { left: 91%; font-size: 48px; animation-duration: 20s; animation-delay: 4s; }

    @keyframes flotar {
      0%   { transform: translateY(0) rotate(0deg);      opacity: 0; }
      15%  { opacity: 1; }
      100% { transform: translateY(-112vh) rotate(360deg); opacity: 0; }
    }

    /* El escenario ocupa toda la pantalla y centra su contenido.
       Al ser 'grid' con una sola celda, el sobre y la tarjeta se
       apilan en el MISMO punto central, por lo que la tarjeta
       invisible ya no empuja al sobre fuera del centro. */
    .stage {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
      padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
    }
    .stage > * {
      grid-area: 1 / 1; /* mismas coordenadas: apilados y centrados */
    }

    /* ===== SOBRE INTERACTIVO ===== */
    .envelope {
      position: relative;
      justify-self: center;
      align-self: center;
      width: min(360px, 86vw);
      aspect-ratio: 3 / 2;
      cursor: pointer;
      z-index: 20;
      border: none;
      background: transparent;
      padding: 0;
      transition: transform 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.9s ease, visibility 0.9s;
      filter: drop-shadow(var(--shadow-soft));
      animation: floatIn 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .envelope__hint {
      position: absolute;
      left: 50%;
      bottom: -46px;
      transform: translateX(-50%);
      font-size: 16px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #d4af37;
      white-space: nowrap;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 1; }
    }

    /* Cuerpo del sobre */
    .envelope__body {
      position: absolute;
      inset: 0;
      background: linear-gradient(155deg, #f8eee2 0%, #f0e2cf 100%);
      border-radius: 14px;
      overflow: hidden;
    }
    /* Solapas laterales/inferior en V */
    .envelope__body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(45deg, rgba(0,0,0,0.05) 0 50%, transparent 50%),
        linear-gradient(-45deg, rgba(0,0,0,0.05) 0 50%, transparent 50%);
      background-size: 50.5% 100%, 50.5% 100%;
      background-position: left, right;
      background-repeat: no-repeat;
    }
    .envelope__pocket {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(155deg, #f2e5d3, #e7d5bd);
      clip-path: polygon(0 100%, 0 40%, 50% 82%, 100% 40%, 100% 100%);
      z-index: 6;
      box-shadow: inset 0 6px 18px rgba(74, 58, 30, 0.12);
    }

    /* Carta que sale */
    .letter {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 14%;
      bottom: 10%;
      background: var(--paper);
      border-radius: 8px;
      box-shadow: 0 10px 26px rgba(74, 58, 30, 0.18);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      z-index: 5;
      transform: translateY(0);
      transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1) 0.15s;
    }
    .letter .heart { font-size: 30px; color: var(--rose); }
    .letter h2 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: clamp(24px, 6vw, 34px);
      line-height: 1;
      color: var(--gold);
      text-align: center;
      letter-spacing: 1px;
    }
    .letter small {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Solapa superior */
    .envelope__flap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 62%;
      background: linear-gradient(155deg, #e6cfa9, #d9b88f);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top;
      transform: rotateX(0deg);
      transition: transform 0.7s ease;
      z-index: 8;
      backface-visibility: hidden;
    }
    .envelope__flap::after {
      content: "♥";
      position: absolute;
      left: 50%;
      top: 20%;
      transform: translateX(-50%);
      color: var(--rose);
      font-size: 22px;
      opacity: 0.85;
    }

    /* Estados al abrir */
    .envelope.open .envelope__flap { transform: rotateX(180deg); z-index: 1; }
    .envelope.open .letter { transform: translateY(-72%); }
    .envelope.gone { opacity: 0; visibility: hidden; transform: scale(1.15); }

    /* ===== TARJETA / INVITACIÓN ===== */
    .card {
      position: relative;
      justify-self: center;
      align-self: center;
      z-index: 2;
      max-width: 480px;
      width: min(480px, 90vw);
      text-align: center;
      background: rgba(255, 253, 249, 0.9);
      backdrop-filter: blur(6px);
      padding: clamp(38px, 7vw, 60px) clamp(26px, 6vw, 50px);
      border-radius: 26px;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(176, 141, 87, 0.25);
      opacity: 0;
      transform: translateY(30px);
      pointer-events: none;
      visibility: hidden;
    }
    .card.show {
      visibility: visible;
      animation: reveal 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      pointer-events: auto;
    }
    @keyframes reveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Marco decorativo interior */
    .card::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(176, 141, 87, 0.3);
      border-radius: 18px;
      pointer-events: none;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 18px;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--gold);
      margin: 22px 0;
    }
    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      width: 46px;
      background: linear-gradient(90deg, transparent, var(--gold-soft));
    }
    .divider::after { background: linear-gradient(90deg, var(--gold-soft), transparent); }
    .divider span { font-size: 16px; }

    .names {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(46px, 13vw, 74px);
      line-height: 0.95;
      letter-spacing: 2px;
      color: var(--gold);
    }
    .names .amp {
      display: block;
      font-style: italic;
      font-size: 0.5em;
      color: var(--rose);
      margin: 6px 0;
    }

    .message {
      font-size: clamp(15px, 4vw, 18px);
      line-height: 1.9;
      color: var(--muted);
      margin: 26px auto 34px;
      max-width: 34ch;
    }

    .btn {
      display: inline-block;
      padding: 16px 44px;
      background: var(--rose);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      letter-spacing: 3px;
      font-size: 13px;
      text-transform: uppercase;
      box-shadow: 0 14px 30px -8px rgba(192, 139, 134, 0.65);
      transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }
    .btn:hover {
      background: var(--gold);
      transform: translateY(-3px);
      box-shadow: 0 18px 36px -8px rgba(176, 141, 87, 0.6);
    }
    .btn:active { transform: translateY(-1px); }

    .seal {
      position: absolute;
      right: 26px;
      bottom: 22px;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 35% 30%, var(--rose-soft), var(--rose));
      color: #fff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 26px;
      box-shadow: 0 10px 22px -6px rgba(192, 139, 134, 0.7);
    }

    @media (max-width: 600px) {
      .seal { width: 48px; height: 48px; font-size: 20px; right: 18px; bottom: 16px; }
      .message { max-width: 26ch; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      .card { opacity: 1; transform: none; pointer-events: auto; visibility: visible; }
      .envelope { display: none; }
    }
  </style>
</head>

<body>
  <div class="glow" aria-hidden="true"></div>

  <div class="corazones" aria-hidden="true">
    <span>♡</span><span>♥</span><span>♡</span>
    <span>♥</span><span>♡</span><span>♥</span>
  </div>

  <main class="stage">
    <!-- Sobre interactivo -->
    <button class="envelope" id="envelope" type="button" aria-label="Abrir el sobre de la invitación">
      <div class="envelope__body"></div>
      <div class="letter">
        <span class="heart">♡</span>
        <h2>Karina<br />&amp;<br />Gerardo</h2>
        <small>Nos casamos</small>
      </div>
      <div class="envelope__pocket"></div>
      <div class="envelope__flap"></div>
      <span class="envelope__hint">Toca para abrir</span>
    </button>

    <!-- Invitación -->
    <article class="card" id="card" aria-hidden="true">
      <p class="eyebrow">Con la bendición de Dios</p>

      <h1 class="names">
        Karina
        <span class="amp">&amp;</span>
        Gerardo
      </h1>

      <div class="divider"><span>♥</span></div>

      <p class="message">
        Tenemos el honor de invitarte a celebrar juntos
        el comienzo de nuestra historia de amor.
      </p>

      <a href="bienvenida.html" class="btn">Abrir invitación</a>

      <div class="seal" aria-hidden="true">♥</div>
    </article>
  </main>

  <script>
    const envelope = document.getElementById("envelope");
    const card = document.getElementById("card");
    let autoOpen;

    function openInvitation() {
      if (envelope.classList.contains("open")) return;
      envelope.classList.add("open");
      clearTimeout(autoOpen);

      // Tras la animación de la carta, ocultar sobre y revelar tarjeta
      setTimeout(() => {
        envelope.classList.add("gone");
        card.classList.add("show");
        card.setAttribute("aria-hidden", "false");
      }, 1200);
    }

    envelope.addEventListener("click", openInvitation);

    // Apertura automática suave si el usuario no interactúa
    autoOpen = setTimeout(openInvitation, 4000);
  </script>
</body>
</html>
