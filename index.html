<style>

:root{

    --cream:#f7f2ea;
    --ink:#3a3a34;
    --rose:#c08b86;
    --gold:#b08d57;

    --serif:"Cormorant Garamond", serif;
    --sans:"Jost", sans-serif;

}


*,
*::before,
*::after{

    margin:0;
    padding:0;
    box-sizing:border-box;

}


body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    font-family:var(--sans);

    background:
    linear-gradient(
        rgba(247,242,234,.75),
        rgba(239,230,216,.85)
    ),
    url("img/portad2.webp");

    background-size:cover;
    background-position:center;

    position:relative;

}



/* Luz ambiental */

body::before{

    content:"";

    position:absolute;

    width:600px;
    height:600px;

    background:
    radial-gradient(
        circle,
        rgba(176,141,87,.30),
        transparent 70%
    );

    animation:luz 10s infinite alternate;

}



@keyframes luz{

    from{
        transform:translate(-120px,-80px);
    }

    to{
        transform:translate(120px,100px);
    }

}



/* SOBRE PRINCIPAL */

.sobre{

    width:100%;
    height:100vh;

    display:flex;

    justify-content:center;
    align-items:center;

    position:relative;

}



/* TARJETA */

.contenido{

    position:relative;

    z-index:2;

    text-align:center;

    background:rgba(255,253,249,.85);

    padding:55px 45px;

    border-radius:25px;

    box-shadow:
    0 20px 45px rgba(58,45,20,.18);


    opacity:0;

    animation:
    mostrarContenido 1.5s ease 3.5s forwards;

}



/* CORAZON */

.corazon{

    font-size:55px;

    color:var(--rose);

    margin-bottom:15px;

}



/* NOMBRES */

.titulo{

    font-family:var(--serif);

    font-size:65px;

    font-weight:400;

    line-height:.95;

    letter-spacing:3px;

    color:var(--gold);

    margin-bottom:25px;

}



/* TEXTO */

.texto{

    font-size:20px;

    line-height:1.8;

    color:#665555;

    margin-bottom:35px;

}



/* BOTON */

.boton{

    display:inline-block;

    padding:15px 40px;

    background:var(--rose);

    color:white;

    text-decoration:none;

    border-radius:50px;

    letter-spacing:2px;

    font-size:15px;

    transition:.3s;

    box-shadow:
    0 8px 20px rgba(183,110,121,.35);

}



.boton:hover{

    background:#565c44;

    transform:translateY(-3px);

}



/* SELLO */

.sello{

    position:absolute;

    right:40px;
    bottom:30px;

    width:70px;
    height:70px;

    background:var(--rose);

    color:white;

    border-radius:50%;

    display:flex;

    justify-content:center;
    align-items:center;

    font-size:35px;

    z-index:2;

}



/* ANIMACION DEL SOBRE */

.sobre-animacion{

    position:fixed;

    width:320px;
    height:220px;

    background:#f8eee2;

    border-radius:10px;

    z-index:20;

    box-shadow:
    0 20px 40px rgba(0,0,0,.25);

    display:flex;

    justify-content:center;

    align-items:center;

    animation:
    ocultarSobre 1s ease 3.5s forwards;

}



/* TAPA */

.tapa{

    position:absolute;

    top:0;

    width:0;
    height:0;

    border-left:160px solid transparent;
    border-right:160px solid transparent;
    border-top:120px solid #d9b88f;

    transform-origin:top;

    animation:
    abrirTapa 2s ease forwards;

}



/* CARTA */

.papel{

    width:85%;
    height:80%;

    background:white;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    font-family:var(--serif);

    color:var(--gold);

    border-radius:5px;

    transform:translateY(70px);

    opacity:0;

    animation:
    salirCarta 1.5s ease 1.2s forwards;

}



.papel span{

    font-size:35px;

    color:var(--rose);

}



.papel h2{

    font-size:35px;

    text-align:center;

    line-height:.8;

}




@keyframes abrirTapa{

    from{
        transform:rotateX(0deg);
    }

    to{
        transform:rotateX(180deg);
    }

}



@keyframes salirCarta{

    from{

        opacity:0;

        transform:translateY(70px);

    }


    to{

        opacity:1;

        transform:translateY(-20px);

    }

}



@keyframes ocultarSobre{

    to{

        opacity:0;

        visibility:hidden;

        transform:scale(1.2);

    }

}



@keyframes mostrarContenido{

    from{

        opacity:0;

        transform:translateY(50px);

    }


    to{

        opacity:1;

        transform:translateY(0);

    }

}




/* RESPONSIVE */

@media(max-width:600px){


    .contenido{

        padding:35px 25px;

        margin:20px;

    }


    .titulo{

        font-size:42px;

    }


    .texto{

        font-size:17px;

    }


    .sello{

        width:55px;
        height:55px;

        font-size:25px;

        right:20px;
        bottom:20px;

    }


    .sobre-animacion{

        width:260px;
        height:180px;

    }


    .tapa{

        border-left-width:130px;
        border-right-width:130px;
        border-top-width:100px;

    }

}



@media(prefers-reduced-motion:reduce){

    *{

        animation:none!important;

        transition:none!important;

    }

}
/* CORAZONES FLOTANTES */

.corazones{

    position:absolute;

    width:100%;
    height:100%;

    overflow:hidden;

    pointer-events:none;

    z-index:1;

}



.corazones span{

    position:absolute;

    bottom:-50px;

    color:rgba(192,139,134,.55);

    font-size:35px;

    animation:
    flotar 12s linear infinite;

}



/* posiciones y velocidades */

.corazones span:nth-child(1){

    left:10%;

    animation-duration:10s;

}


.corazones span:nth-child(2){

    left:25%;

    font-size:50px;

    animation-duration:14s;

}



.corazones span:nth-child(3){

    left:45%;

    animation-duration:11s;

}



.corazones span:nth-child(4){

    left:65%;

    font-size:45px;

    animation-duration:15s;

}



.corazones span:nth-child(5){

    left:80%;

    animation-duration:12s;

}



.corazones span:nth-child(6){

    left:90%;

    font-size:55px;

    animation-duration:16s;

}




@keyframes flotar{


0%{

    transform:
    translateY(0)
    rotate(0deg);

    opacity:0;

}



20%{

    opacity:1;

}



100%{

    transform:
    translateY(-110vh)
    rotate(360deg);

    opacity:0;

}


}

</style>

</head>
